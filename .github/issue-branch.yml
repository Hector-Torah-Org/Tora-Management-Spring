# Automatically close issue after a pull request merge
autoCloseIssue: true

# Override the source branch 
# Should be changed to 'development' at a later time 
# (at the latest after the first release) to keep the 'main' branch stable.
defaultBranch: 'main'

#Skip branch creation based on issue label 'question'
branches:
  - label: question
    skip: true

# Automatically open a Pull Request
openPR: true

# Copy attributes from issue
copyIssueDescriptionToPR: true
copyIssueLabelsToPR: true
copyIssueAssigneeToPR: true
copyIssueMilestoneToPR: true
